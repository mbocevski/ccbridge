# ccbridge daemon configuration
#
# Location: $XDG_CONFIG_HOME/ccbridge/config.toml
#           (defaults to ~/.config/ccbridge/config.toml)
#
# All values shown below are the compiled-in defaults.
# You only need to include keys you want to override.
# Unknown keys are rejected with a clear error.

# ---------------------------------------------------------------------------
# [approvals] — interactive approval behaviour
# ---------------------------------------------------------------------------

[approvals]

# How long to wait for a decision from any emit module (notify, ctrl socket,
# BLE, etc.) before falling back to the behaviour specified by `fallback`.
timeout_ms = 30000

# What to do when the timeout elapses with no decision:
#
#   "passthrough" (default) — send `ask` so Claude Code surfaces its own TUI
#                             prompt regardless of the session's permission mode.
#   "deny"                  — automatically deny with a reason.
#   "allow"                 — automatically allow.
fallback = "passthrough"

# ---------------------------------------------------------------------------
# [emit.notify] — freedesktop desktop notifications
#                 (any daemon implementing org.freedesktop.Notifications)
# ---------------------------------------------------------------------------

[emit.notify]
enabled = true

# Urgency level passed to the notification daemon.
# Values: "low", "normal", "critical"
# "critical" means the notification is never auto-dismissed.
urgency = "critical"

# ---------------------------------------------------------------------------
# [emit.notify.turn_done] — "Claude is done" idle-gated notification
#
# Posts a non-actionable notification when a session has been idle for
# `idle_grace_ms` after a Stop event (i.e. you walked away rather than
# typing a follow-up prompt). One notification per session — consecutive
# turns in the same session collapse rather than stacking.
# ---------------------------------------------------------------------------

[emit.notify.turn_done]
enabled       = true
# How long after Stop the user must remain idle before the notif fires.
idle_grace_ms = 10000
# How long the notification stays on screen, in milliseconds.
# 0 = let the notification daemon decide; -1 = persistent.
expire_ms     = 5000

# ---------------------------------------------------------------------------
# [emit.ctrl] — bidirectional control socket
#               ($XDG_RUNTIME_DIR/ccbridge/ctrl.sock)
# ---------------------------------------------------------------------------

[emit.ctrl]
enabled = true

# If true the ctrl socket accepts SimulateApproval messages from test clients.
# Leave false in production.
allow_simulate = false

# ---------------------------------------------------------------------------
# [emit.http] — optional HTTP emitter (disabled by default)
# ---------------------------------------------------------------------------

[emit.http]
enabled = false
addr    = "127.0.0.1:9876"

# ---------------------------------------------------------------------------
# [emit.ble] — Bluetooth Low Energy NUS bridge (disabled by default)
#
# ccbridge plays the BLE *central* role: it watches BlueZ for paired devices
# that advertise the Nordic UART Service and runs one session per device.
# Pairing itself happens via the OS (`bluetoothctl pair AA:BB:CC:DD:EE:FF`,
# blueman-applet, GNOME / KDE Bluetooth panel, etc.) — the daemon never
# initiates pairing on its own.  This keeps key storage in BlueZ where it
# belongs.
# ---------------------------------------------------------------------------

[emit.ble]
enabled = false

# Service UUID a paired device must advertise to be considered ours.
# Any peripheral speaking the standard NUS+JSON dialect ccbridge expects.
service_uuid = "6e400001-b5a3-f393-e0a9-e50e24dcca9e"

# Per-device overrides — one [[emit.ble.device]] block per paired device.
# `nickname` is shown in logs; `disabled = true` makes ccbridge ignore the
# device without un-pairing it from the OS.  Address matching is case-
# insensitive.
#
# [[emit.ble.device]]
# address  = "AA:BB:CC:DD:EE:FF"
# nickname = "desk buddy"
# disabled = false

# ---------------------------------------------------------------------------
# [tokens] — token-usage persistence
# ---------------------------------------------------------------------------

[tokens]
# Override the path where the token state (daily/cumulative counts) is stored.
# Defaults to $XDG_STATE_HOME/ccbridge/tokens.json
# (or $HOME/.local/state/ccbridge/tokens.json).
# Uncomment and set to a custom path if needed:
# state_path = "/home/user/.local/state/ccbridge/tokens.json"
